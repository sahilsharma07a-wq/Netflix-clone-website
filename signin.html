<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in </title>
    <link rel="stylesheet" href="signin.css">
</head>

<body>
    <div class="hero">
        <div class="navbar">
            <img src="logo.svg" alt="netflix logo" id="img">
        </div>
        <br>
        <hr>
        <div class="content">
            <h1>Enter your info to sign in</h1><br>
            <p id="line">
                Or get started with a new account.
            </p><br>
            <input type="text" placeholder="Email or mobile number" id="input_area"><br>
            <button>Continue</button><br><br><br><br>
            Get Help <select></select>
            <br><br>
            <span id="para">This page is protected by Google reCAPTCHA to ensure you're not a bot.</span>
            <span>Learn more</span>
        </div>
    </div>
    <div class="footer">

        <p id="paragraph">Questions?Call 000-800-919-1743 (Toll-Free)</p>
        <div class="links">
            <span>
                <a href="/" id="list">FAQ</a>
                <a href="/" id="list">Cookie Preferences</a>
            </span>
            <span>
                <a href="" id="list">Help Center</a>
                <a href="/" id="list">Corporate Information</a>
            </span>
            <span>
                <a href="/" id="list">Terms of Use</a></span>
            <span><a href="/" id="list">Privacy</a></span>
            <br><br><br>
        </div>
        <select id="lang">
            <option value="English" >English</option>
            <option value="Hindi">Hindi</option>
        </select>
    </div>
</body>

</html>
